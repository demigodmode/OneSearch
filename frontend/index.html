<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneSearch - Self-hosted Search</title>
    <meta name="description" content="Fast, privacy-focused search for your homelab" />

    <!-- Fonts: Outfit for UI, JetBrains Mono for code/paths -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('onesearch-theme'));
          if (t) {
            var r = document.documentElement.style;
            r.setProperty('--brand-h', t.brandH);
            r.setProperty('--brand-s', t.brandS + '%');
            r.setProperty('--brand-l', t.brandL + '%');
            r.setProperty('--bg-h', t.bgH);
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
