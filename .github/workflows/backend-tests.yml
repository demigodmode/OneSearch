name: Backend + CLI CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'cli/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      meilisearch:
        image: getmeili/meilisearch:v1.12
        ports:
          - 7700:7700
        env:
          MEILI_MASTER_KEY: test-master-key
          MEILI_ENV: development
        options: >-
          --health-cmd="wget --no-verbose --spider http://127.0.0.1:7700/health || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock', 'backend/pyproject.toml', 'cli/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install workspace dependencies
        run: |
          uv sync --all-extras --all-groups

      - name: Run backend tests
        env:
          MEILI_URL: http://127.0.0.1:7700
          MEILI_MASTER_KEY: test-master-key
        run: |
          uv run pytest backend/tests/ -v --tb=short --color=yes --cov=app --cov-report=xml

      - name: Run CLI tests
        run: |
          uv run pytest cli/tests/ -v --tb=short --color=yes

      - name: Build onesearch-cli package
        run: |
          uv run --with build python -m build cli

      - name: Upload onesearch-cli artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onesearch-cli-dist
          path: cli/dist/*

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
