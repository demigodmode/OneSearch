name: Bug report
description: Report a reproducible problem with OneSearch
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, passwords, tokens, and private paths from logs or config.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: "Indexing fails during full reindex"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release, Docker tag, or commit SHA.
      placeholder: "v1.0.2, latest, main@abc123"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Indexing / scanning
        - Search
        - Preview
        - Admin UI
        - Docker / deployment
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Install method, OS/NAS, Docker/compose setup, source storage type, relevant mounts/paths.
      placeholder: |
        Install:
        Host:
        Storage/source:
        Relevant mounts:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or config
      description: Paste relevant logs/config. Remove secrets first.
      render: shell
    validations:
      required: true
